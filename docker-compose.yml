version: '3.8'

# This file orchestrates the full oncoSahana ecosystem:
# 1. Frontend (Next.js)
# 2. Auth Backend (2FA)
# 3. Feedback Backend (FeedPulse)

services:
  # Next.js Frontend
  oncosahana-frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=
      - AUTH_BACKEND_URL=http://auth-service:4000
      - FEEDBACK_BACKEND_URL=http://feedback-service:5000
    depends_on:
      - auth-service
      - feedback-service
    networks:
      - oncosahana-network

  # Auth Backend (2FA)
  auth-service:
    # This assumes the 2FA project is a sibling directory to oncoSahana
    # You will need to add a basic Dockerfile to the 2FA project as well
    build:
      context: ../2FA
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=your_jwt_secret_key
      - PORT=4000
    networks:
      - oncosahana-network

  # Feedback Backend (FeedPulse)
  feedback-service:
    # This assumes the FeedPulse project is a sibling directory to oncoSahana
    # You will need to add a basic Dockerfile to the FeedPulse project as well
    build:
      context: ../FeedPulse
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET=your_jwt_secret_key
      - PORT=5000
    networks:
      - oncosahana-network

networks:
  oncosahana-network:
    driver: bridge
